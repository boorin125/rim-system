version: '3.8'

services:
  # ─────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: rim-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rimdb}
      POSTGRES_USER: ${DB_USER:-rimuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - rim_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-rimuser}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rim_network

  # ─────────────────────────────────────
  # Backend (NestJS)
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: rim-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rimuser}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-rimdb}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${APP_URL:-http://localhost}
      LICENSE_VENDOR_SECRET: ${LICENSE_VENDOR_SECRET:-rim-vendor-2026}
      MACHINE_ID: ${MACHINE_ID:-rim-server-production}
      CENTRAL_LICENSE_URL: ${CENTRAL_LICENSE_URL:-https://rim-license-server-production.up.railway.app}
      TZ: Asia/Bangkok
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@rim-system.com}
    volumes:
      - rim_uploads:/app/uploads
      - rim_backups:/app/Backup
    networks:
      - rim_network

  # ─────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${APP_URL:-http://localhost}/api
    container_name: rim-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3001
      NODE_ENV: production
    networks:
      - rim_network

  # ─────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rim-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - rim_network

volumes:
  rim_db_data:
  rim_uploads:
  rim_backups:

networks:
  rim_network:
    driver: bridge
